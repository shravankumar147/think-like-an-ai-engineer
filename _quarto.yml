# CROSS REFERENCES
# =========================================================
crossref:
  chapters: true

# =========================================================
# BIBLIOGRAPHY
# =========================================================
bibliography: references.bib

# =========================================================
# OUTPUT FORMATS
# =========================================================
format:

  html:
    theme: cosmo

    toc: true
    toc-depth: 3

    number-sections: true
    number-depth: 2

    code-copy: true
    code-overflow: wrap
    code-tools: true

    smooth-scroll: true

  pdf:
    documentclass: book

    toc: true

    number-sections: true
    number-depth: 2

    fontsize: 11pt

    geometry:
      - margin=1in

# =========================================================
# EXECUTION
# =========================================================
execute:
  echo: true
  warning: false
  message: false
  freeze: auto